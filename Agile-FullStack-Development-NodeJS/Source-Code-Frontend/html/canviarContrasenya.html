    <div class="login-container">
        <h2>Canviar la contrasenya</h2>
        <form id="loginForm">
            <div class="form-group">
                <label for="password">Introdueix la teva contrasenya:</label>
                <input type="password" id="passwordCurrent" name="passwordCurrent" required>
            </div>
            
            <div class="form-group">
                <label for="password">Introdueix la nova contrasenya:</label>
                <input type="password" id="password" name="password" required>
            </div>

            <div class="form-group">
                <label for="password2">Repeteix la contrasenya:</label>
                <input type="password" id="password2" name="password2" required>
            </div>
            
            <button type="submit" class="btn">Canviar contrasenya</button>
        </form>
