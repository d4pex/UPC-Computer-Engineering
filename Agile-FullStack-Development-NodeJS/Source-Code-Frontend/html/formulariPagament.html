  <main class="page-container">
    <div class="login-container">
      <h1 class="h1">Detalls de Pagament</h1>
      <!-- Div per a notificacions d'èxit o error -->
      <div id="notification" class="notification"></div>
      <form id="payment-form">

        <!-- Nom del titular -->
        <div class="form-group">
          <label for="nomTitular">Nom del titular</label>
          <input type="text"
                 id="nomTitular"
                 name="nomTitular"
                 placeholder="Joan Garcia"
                 required>
        </div>

        <!-- Compte bancari -->
        <div class="form-group">
          <label for="compteBancari">Compte bancari</label>
          <input type="text"
                 id="compteBancari"
                 name="compteBancari"
                 placeholder="1234-5678-9012-3456"
                 maxlength="19"
                 required
                 oninput="let d=this.value.replace(/\D/g,''); let g=d.match(/.{1,4}/g)||[]; this.value=g.join('-').slice(0,19);">
        </div>

        <!-- Data de caducitat amb Flatpickr o date picker -->
        <div class="form-group">
          <label for="dataCaducitat">Data de caducitat</label>
          <input type="text"
                 id="dataCaducitat"
                 name="dataCaducitat"
                 placeholder="Selecciona data"
                 required
                 style="margin-top:8px; display:block; max-width:200px;">
        </div>

        <!-- PIN a la dreta -->
        <div class="form-group" style="display:flex; align-items:center; gap:8px;">
          <label for="pin" style="margin:0;">PIN</label>
          <input type="password"
                 id="pin"
                 name="pin"
                 maxlength="3"
                 placeholder="123"
                 required>
        </div>

        <!-- Camp ocult de crèdits -->
        <input type="hidden" id="credits-a-comprar" name="credits" value="">

        <!-- Botó de pagament -->
        <button type="submit" class="btn">Pagar</button>
      </form>
    </div>
  </main>

  <!-- Flatpickr JS (si l'estàs usant) -->
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      document.getElementById('credits-a-comprar').value = params.get('credits') || '';

      // Inicialitzar Flatpickr si està present
      if (typeof flatpickr !== 'undefined') {
        flatpickr("#dataCaducitat", {
          altInput: true,
          altFormat: "d/m/Y",
          dateFormat: "Y-m-d",
          minDate: new Date().fp_incr(1)
        });
      }
    });
  </script>
  <script src="../js/compraCredits.js" defer></script>
  <script src="../js/consultaCredits.js" defer></script>
